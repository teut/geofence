<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GPS Boundary Alarm</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111;
            color: white;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .top-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            background: rgba(20, 20, 20, 0.88);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            background: #0a84ff;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            transform: scale(0.98);
        }

        .danger {
            background: #ff3b30;
        }

        .status {
            font-size: 15px;
            line-height: 1.4;
        }

        #alertOverlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 0, 0, 0.25);
            z-index: 999;
            display: none;
            animation: flash 1s infinite;
            pointer-events: none;
        }

        @keyframes flash {
            0% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.2;
            }
        }

        .instructions {
            font-size: 13px;
            opacity: 0.85;
        }

        /* -----------------------------
   HAMBURGER MENU
----------------------------- */

        .hamburger {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 2000;

            width: 52px;
            height: 52px;

            border: none;
            border-radius: 14px;

            background: rgba(20, 20, 20, 0.9);
            color: white;

            font-size: 28px;
            font-weight: bold;

            backdrop-filter: blur(10px);

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }

        .side-menu {
            position: absolute;
            top: 0;
            left: 0;

            width: 320px;
            max-width: 85vw;

            height: 100%;

            background: rgba(10, 10, 10, 0.95);

            z-index: 1500;

            overflow-y: auto;

            padding:
                calc(env(safe-area-inset-top) + 70px) 14px 30px 14px;

            box-sizing: border-box;

            transition: transform 0.28s ease;

            backdrop-filter: blur(14px);
        }

        .side-menu.closed {
            transform: translateX(-105%);
        }

        .menu-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .coord-input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
        }

        .coord-list {
            max-height: 180px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div id="alertOverlay"></div>

    <!-- HAMBURGER BUTTON -->
    <button id="menuToggle" class="hamburger">
        ☰
    </button>

    <!-- SIDE MENU -->
    <div id="sideMenu" class="side-menu open">

        <button id="testSoundBtn">
            Test Sound
          </button>

        <div class="menu-header">
            GPS Boundary
        </div>

        <div class="card">
            <div class="status" id="status">
                Waiting for GPS...
            </div>
        </div>

        <div class="card instructions">
            Add polygon points by:
            <ul style="padding-left:18px;margin:8px 0;">
                <li>Tapping on the map</li>
                <li>Entering coordinates manually</li>
            </ul>
        </div>

        <div class="card">
            <div style="
              display:flex;
              flex-direction:column;
              gap:8px;
              margin-bottom:8px;
            ">
                <input id="latInput" type="number" step="any" placeholder="Latitude" class="coord-input" />

                <input id="lngInput" type="number" step="any" placeholder="Longitude" class="coord-input" />
            </div>
            <button id="addCoordBtn">
                Add Coordinate
            </button>
        </div>

        <div class="card">
            <div style="font-weight:600;margin-bottom:8px;">
                Polygon Points
            </div>

            <div id="coordList" class="coord-list">
                No points yet.
            </div>
        </div>

        <div class="card">
            <button id="finishBtn">
                Finish Boundary
            </button>
        </div>

        <div class="card">
            <button id="clearBtn" class="danger">
                Clear Boundary
            </button>
        </div>

        <div class="card">

            <div style="font-weight:600;margin-bottom:10px;">
                Save / Load Polygon
            </div>

            <input id="polygonName" type="text" placeholder="Polygon name" class="coord-input"
                style="margin-bottom:8px;width:100%;box-sizing:border-box;" />

            <button id="savePolygonBtn" style="margin-bottom:10px;">
                Save Polygon
            </button>

            <select id="savedPolygons" class="coord-input" style="width:100%;margin-bottom:8px;">
                <option value="">
                    Select saved polygon
                </option>
            </select>

            <button id="loadPolygonBtn">
                Load Polygon
            </button>

        </div>

    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // -----------------------------
        // MAP SETUP
        // -----------------------------
        const map = L.map('map').setView([51.0, 4.0], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // -----------------------------
        // STATE
        // -----------------------------
        let userMarker = null;
        let polygonPoints = [];
        let polygon = null;
        let drawingLine = null;
        let boundaryFinished = false;
        let currentlyOutside = false;

        const statusEl = document.getElementById('status');
        const alertOverlay = document.getElementById('alertOverlay');

        const polygonNameInput = document.getElementById('polygonName');
        const savedPolygonsSelect = document.getElementById('savedPolygons');

        // -----------------------------
        // INIT
        // -----------------------------
        refreshSavedPolygonDropdown();

        // -----------------------------
        // AUDIO BEEP
        // -----------------------------
        let audioCtx;
let audioUnlocked = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  audioUnlocked = true;
}

// MUST be called from user gesture (important for iPhone)
document.body.addEventListener('touchstart', initAudio, { once: true });

function beep() {
  if (!audioUnlocked || !audioCtx) return;

  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = 'sine';
  oscillator.frequency.value = 880;

  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + 0.3
  );

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.3);
}

function alertOutside() {
  beep();

  if (navigator.vibrate) {
    navigator.vibrate([300, 100, 300]);
  }
}

document
  .getElementById('testSoundBtn')
  .addEventListener('click', () => {
    initAudio();
    beep();
  });
  
        // -----------------------------
        // POINT IN POLYGON
        // -----------------------------
        function isPointInPolygon(point, vs) {
            const x = point.lng, y = point.lat;

            let inside = false;

            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                const xi = vs[i].lng, yi = vs[i].lat;
                const xj = vs[j].lng, yj = vs[j].lat;

                const intersect =
                    ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

                if (intersect) inside = !inside;
            }

            return inside;
        }

        // -----------------------------
        // DRAW POINTS
        // -----------------------------
        function addPolygonPoint(latlng) {
            polygonPoints.push(latlng);

            L.circleMarker(latlng, {
                radius: 6,
                color: '#00ff88'
            }).addTo(map);

            redrawShape();
            refreshCoordinateList();
        }

        map.on('click', (e) => {
            if (boundaryFinished) return;

            addPolygonPoint(e.latlng);
        });

        function redrawShape() {
            if (drawingLine) {
                map.removeLayer(drawingLine);
            }

            drawingLine = L.polyline(polygonPoints, {
                color: '#00ff88',
                weight: 3
            }).addTo(map);
        }

        // -----------------------------
        // MANUAL COORDINATE ENTRY
        // -----------------------------
        document
            .getElementById('addCoordBtn')
            .addEventListener('click', () => {

                if (boundaryFinished) return;

                const lat = parseFloat(
                    document.getElementById('latInput').value
                );

                const lng = parseFloat(
                    document.getElementById('lngInput').value
                );

                if (isNaN(lat) || isNaN(lng)) {
                    alert('Enter valid coordinates.');
                    return;
                }

                const latlng = {
                    lat,
                    lng
                };

                addPolygonPoint(latlng);

                map.panTo(latlng);

                document.getElementById('latInput').value = '';
                document.getElementById('lngInput').value = '';
            });

        // -----------------------------
        // SAVE POLYGON
        // -----------------------------
        document
            .getElementById('savePolygonBtn')
            .addEventListener('click', () => {

                if (polygonPoints.length < 3) {
                    alert('Create a polygon first.');
                    return;
                }

                const name =
                    polygonNameInput.value.trim();

                if (!name) {
                    alert('Enter a polygon name.');
                    return;
                }

                const data = getSavedPolygons();

                data[name] = polygonPoints.map(p => ({
                    lat: p.lat,
                    lng: p.lng
                }));

                savePolygonsToStorage(data);

                refreshSavedPolygonDropdown();

                alert('Polygon saved.');

            });
        // -----------------------------
        // COORDINATE LIST UI
        // -----------------------------
        const coordList = document.getElementById('coordList');

        function refreshCoordinateList() {
            if (polygonPoints.length === 0) {
                coordList.innerHTML = 'No points yet.';
                return;
            }

            coordList.innerHTML = polygonPoints
                .map((p, index) => `
      <div style="
        padding:4px 0;
        border-bottom:1px solid rgba(255,255,255,0.08);
      ">
        ${index + 1}.
        ${p.lat.toFixed(6)},
        ${p.lng.toFixed(6)}
      </div>
    `)
                .join('');
        }

        // -----------------------------
        // LOCAL STORAGE
        // -----------------------------
        function getSavedPolygons() {
            return JSON.parse(
                localStorage.getItem('savedPolygons') || '{}'
            );
        }

        function savePolygonsToStorage(data) {
            localStorage.setItem(
                'savedPolygons',
                JSON.stringify(data)
            );
        }

        function refreshSavedPolygonDropdown() {

            const data = getSavedPolygons();

            savedPolygonsSelect.innerHTML = `
    <option value="">
      Select saved polygon
    </option>
  `;

            Object.keys(data).forEach(name => {

                const option =
                    document.createElement('option');

                option.value = name;
                option.textContent = name;

                savedPolygonsSelect.appendChild(option);

            });

        }

        // -----------------------------
        // LOAD POLYGON
        // -----------------------------
        document
            .getElementById('loadPolygonBtn')
            .addEventListener('click', () => {

                const selected =
                    savedPolygonsSelect.value;

                if (!selected) {
                    alert('Select a polygon.');
                    return;
                }

                const data = getSavedPolygons();

                const points = data[selected];

                if (!points || points.length < 3) {
                    alert('Invalid polygon.');
                    return;
                }

                // Clear existing
                polygonPoints = [];
                boundaryFinished = false;

                if (polygon) {
                    map.removeLayer(polygon);
                    polygon = null;
                }

                if (drawingLine) {
                    map.removeLayer(drawingLine);
                    drawingLine = null;
                }

                map.eachLayer(layer => {

                    if (
                        layer instanceof L.CircleMarker &&
                        layer !== userMarker
                    ) {
                        map.removeLayer(layer);
                    }

                });

                // Load points
                points.forEach(p => {

                    addPolygonPoint({
                        lat: p.lat,
                        lng: p.lng
                    });

                });

                // Auto-finish polygon
                boundaryFinished = true;

                if (drawingLine) {
                    map.removeLayer(drawingLine);
                }

                polygon = L.polygon(polygonPoints, {
                    color: '#00ff88',
                    fillColor: '#00ff88',
                    fillOpacity: 0.2
                }).addTo(map);

                map.fitBounds(polygon.getBounds());

                sideMenu.classList.add('closed');

                statusEl.innerHTML = `
      Loaded polygon:
      <br>
      <strong>${selected}</strong>
    `;

            });

        // -----------------------------
        // FINISH POLYGON
        // -----------------------------
        document.getElementById('finishBtn').addEventListener('click', () => {
            if (polygonPoints.length < 3) {
                alert('You need at least 3 points.');
                return;
            }

            boundaryFinished = true;

            if (drawingLine) {
                map.removeLayer(drawingLine);
            }

            polygon = L.polygon(polygonPoints, {
                color: '#00ff88',
                fillColor: '#00ff88',
                fillOpacity: 0.2
            }).addTo(map);

            map.fitBounds(polygon.getBounds());

            statusEl.innerHTML = `
      Boundary active.<br>
      Stay inside the green area.
    `;

            sideMenu.classList.add('closed');

        });

        // -----------------------------
        // CLEAR
        // -----------------------------
        document.getElementById('clearBtn').addEventListener('click', () => {
            polygonPoints = [];
            boundaryFinished = false;
            currentlyOutside = false;

            if (polygon) {
                map.removeLayer(polygon);
                polygon = null;
            }

            if (drawingLine) {
                map.removeLayer(drawingLine);
                drawingLine = null;
            }

            map.eachLayer(layer => {
                if (
                    layer instanceof L.CircleMarker &&
                    layer !== userMarker
                ) {
                    map.removeLayer(layer);
                }
            });

            alertOverlay.style.display = 'none';

            statusEl.innerHTML = 'Boundary cleared.';
        });

        // -----------------------------
        // GPS TRACKING
        // -----------------------------
        function onLocationUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            const latlng = [lat, lng];

            if (!userMarker) {
                userMarker = L.circleMarker(latlng, {
                    radius: 10,
                    color: '#0a84ff',
                    fillColor: '#0a84ff',
                    fillOpacity: 1
                }).addTo(map);

                map.setView(latlng, 18);
            } else {
                userMarker.setLatLng(latlng);
            }

            statusEl.innerHTML = `
      GPS Active<br>
      Lat: ${lat.toFixed(5)}<br>
      Lng: ${lng.toFixed(5)}
    `;

            if (boundaryFinished && polygonPoints.length >= 3) {
                const inside = isPointInPolygon(
                    { lat, lng },
                    polygonPoints
                );

                if (!inside) {
                    if (!currentlyOutside) {
                        alertOutside();
                    }

                    currentlyOutside = true;

                    alertOverlay.style.display = 'block';

                    statusEl.innerHTML += `
          <br><br>
          <span style="color:#ff453a;font-weight:bold;">
            OUTSIDE BOUNDARY
          </span>
        `;
                } else {
                    currentlyOutside = false;
                    alertOverlay.style.display = 'none';
                }
            }
        }

        function onLocationError(err) {
            statusEl.innerHTML = `
      GPS Error:<br>
      ${err.message}
    `;
        }

        navigator.geolocation.watchPosition(
            onLocationUpdate,
            onLocationError,
            {
                enableHighAccuracy: true,
                maximumAge: 1000,
                timeout: 10000
            }
        );

        // -----------------------------
        // iPhone Audio Unlock
        // -----------------------------
        document.body.addEventListener('touchstart', async () => {
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }, { once: true });

        // -----------------------------
        // HAMBURGER MENU
        // -----------------------------
        const sideMenu =
            document.getElementById('sideMenu');

        const menuToggle =
            document.getElementById('menuToggle');

        menuToggle.addEventListener('click', () => {

            sideMenu.classList.toggle('closed');

        });


    </script>

</body>

</html>
