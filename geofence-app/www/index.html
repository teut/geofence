<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GPS Boundary Alarm</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div id="map"></div>

    <div id="alertOverlay"></div>

    <!-- HAMBURGER BUTTON -->
    <button id="menuToggle" class="hamburger">
        ☰
    </button>

    <!-- SIDE MENU -->
    <div id="sideMenu" class="side-menu open">

        <button id="testSoundBtn">
            Test Sound
        </button>

        <div class="menu-header">
            GPS Boundary
        </div>

        <div class="card">
            <div class="status" id="status">
                Waiting for GPS...
            </div>
        </div>

        <div class="card instructions">
            Add polygon points by:
            <ul style="padding-left:18px;margin:8px 0;">
                <li>Tapping on the map</li>
                <li>Entering coordinates manually</li>
            </ul>
        </div>

        <div class="card">
            <div style="
              display:flex;
              flex-direction:column;
              gap:8px;
              margin-bottom:8px;
            ">
                <input id="latInput" type="number" step="any" placeholder="Latitude" class="coord-input" />

                <input id="lngInput" type="number" step="any" placeholder="Longitude" class="coord-input" />
            </div>
            <button id="addCoordBtn">
                Add Coordinate
            </button>
        </div>

        <div class="card">
            <div style="font-weight:600;margin-bottom:8px;">
                Polygon Points
            </div>

            <div id="coordList" class="coord-list">
                No points yet.
            </div>
        </div>

        <div class="card">
            <button id="finishBtn">
                Finish Boundary
            </button>
        </div>

        <div class="card">
            <button id="clearBtn" class="danger">
                Clear Boundary
            </button>
        </div>

        <div class="card">

            <div style="font-weight:600;margin-bottom:10px;">
                Save / Load Polygon
            </div>

            <input id="polygonName" type="text" placeholder="Polygon name" class="coord-input"
                style="margin-bottom:8px;width:100%;box-sizing:border-box;" />

            <button id="savePolygonBtn" style="margin-bottom:10px;">
                Save Polygon
            </button>

            <select id="savedPolygons" class="coord-input" style="width:100%;margin-bottom:8px;">
                <option value="">
                    Select saved polygon
                </option>
            </select>

            <button id="loadPolygonBtn">
                Load Polygon
            </button>

        </div>

    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>

</body>

</html>
